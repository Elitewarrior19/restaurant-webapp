query ListAllRestaurants @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public as it lists public restaurant information.") {
  restaurants {
    id
    name
    cuisine
    city
    averageRating
    description
    imageUrl
  }
}

query GetMyReservations @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users as it retrieves their own reservations using auth.uid.") {
  reservations(where: {userId: {eq_expr: "auth.uid"}}) {
    id
    restaurant {
      name
    }
    reservationDate
    reservationTime
    numberOfGuests
    status
  }
}

mutation CreateNewReview($restaurantId: UUID!, $comment: String!, $rating: Int!, $imageUrl: String) @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users as it allows them to create reviews linked to their auth.uid.") {
  review_insert(data: {
    restaurantId: $restaurantId,
    comment: $comment,
    rating: $rating,
    imageUrl: $imageUrl,
    userId_expr: "auth.uid"
  })
}

mutation UpdateMyProfile($displayName: String, $photoUrl: String) @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users as it allows them to update their own profile using auth.uid.") {
  user_update(key: {id_expr: "auth.uid"}, data: {
    displayName: $displayName,
    photoUrl: $photoUrl
  })
}